# Reusable Python CI Workflow
# Used by: multiskin, skintwin-integrations, org-skin
#
# This workflow provides standardized CI for all Python repositories in the ecosystem.
# It includes static checks, unit tests, build verification, and security scanning.

name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.11"
      working-directory:
        description: "Working directory for the project"
        type: string
        default: "."
      package-manager:
        description: "Package manager (pip, poetry, uv)"
        type: string
        default: "pip"
      coverage-threshold:
        description: "Minimum coverage percentage required"
        type: number
        default: 80
      enable-matrix:
        description: "Enable matrix testing across Python versions"
        type: boolean
        default: false
      enable-jax:
        description: "Enable JAX/JAXlib dependencies for AI/ML repos"
        type: boolean
        default: false
    secrets:
      PYPI_TOKEN:
        required: false
        description: "PyPI token for package publishing"
      CODECOV_TOKEN:
        required: false
        description: "Codecov upload token"

# Cancel superseded runs on the same PR
concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  # ============================================================================
  # Static Analysis
  # ============================================================================
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.working-directory }}/requirements*.txt
            ${{ inputs.working-directory }}/pyproject.toml

      - name: Install uv
        if: inputs.package-manager == 'uv'
        uses: astral-sh/setup-uv@v5

      - name: Install Poetry
        if: inputs.package-manager == 'poetry'
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "uv" ]; then
            uv sync --frozen
          elif [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry install --no-interaction
          else
            pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install -r requirements.txt
          fi

      - name: Run ruff linting
        working-directory: ${{ inputs.working-directory }}
        run: |
          pip install ruff
          ruff check .

      - name: Run ruff formatting check
        working-directory: ${{ inputs.working-directory }}
        run: ruff format --check .

      - name: Run type checking with mypy
        working-directory: ${{ inputs.working-directory }}
        run: |
          pip install mypy
          mypy . --ignore-missing-imports || true

  # ============================================================================
  # Unit Tests with Coverage
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.working-directory }}/requirements*.txt
            ${{ inputs.working-directory }}/pyproject.toml

      - name: Install uv
        if: inputs.package-manager == 'uv'
        uses: astral-sh/setup-uv@v5

      - name: Install Poetry
        if: inputs.package-manager == 'poetry'
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install JAX dependencies
        if: inputs.enable-jax
        run: |
          pip install jax jaxlib

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "uv" ]; then
            uv sync --frozen
          elif [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry install --no-interaction
          else
            pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install -r requirements.txt
          fi
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with coverage
        working-directory: ${{ inputs.working-directory }}
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=test-results/junit.xml \
            -v \
            tests/ || pytest -v

      - name: Upload coverage to Codecov
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working-directory }}/coverage.xml
          fail_ci_if_error: false

      - name: Check coverage threshold
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(float(tree.getroot().attrib.get('line-rate', 0)) * 100)")
            echo "Coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < ${{ inputs.coverage-threshold }}" | bc -l) )); then
              echo "Coverage ${COVERAGE}% is below threshold ${{ inputs.coverage-threshold }}%"
              exit 1
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ inputs.python-version }}
          path: |
            ${{ inputs.working-directory }}/htmlcov
            ${{ inputs.working-directory }}/test-results
            ${{ inputs.working-directory }}/coverage.xml
          retention-days: 14

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.working-directory }}/requirements*.txt
            ${{ inputs.working-directory }}/pyproject.toml

      - name: Install build tools
        run: pip install build wheel twine

      - name: Install JAX dependencies
        if: inputs.enable-jax
        run: pip install jax jaxlib

      - name: Build package
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f pyproject.toml ]; then
            python -m build
          elif [ -f setup.py ]; then
            python setup.py sdist bdist_wheel
          fi

      - name: Verify package
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -d dist ]; then
            twine check dist/*
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.working-directory }}
          artifact-name: sbom-python-${{ inputs.python-version }}.spdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-python-${{ inputs.python-version }}
          path: ${{ inputs.working-directory }}/dist
          retention-days: 7

  # ============================================================================
  # Matrix Testing (Optional)
  # ============================================================================
  matrix-test:
    name: Matrix Test (Python ${{ matrix.python-version }})
    if: inputs.enable-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-checks
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.working-directory }}/requirements*.txt
            ${{ inputs.working-directory }}/pyproject.toml

      - name: Install JAX dependencies
        if: inputs.enable-jax
        run: pip install jax jaxlib

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: pytest tests/ -v || pytest -v

  # ============================================================================
  # Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, build]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.static-checks.result }}" != "success" ]; then
            echo "Static checks failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "All CI checks passed!"

      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Checks | ${{ needs.static-checks.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
