# Reusable E2E Test Execution Workflow
# Used across ecosystem repositories for end-to-end testing
#
# This workflow supports tiered E2E testing: smoke, regression, and exhaustive.
# It includes environment provisioning, test execution, and artifact collection.

name: E2E Test Execution

on:
  workflow_call:
    inputs:
      tier:
        description: "E2E test tier: smoke, regression, exhaustive"
        type: string
        default: "smoke"
      browser:
        description: "Browser to use for E2E tests"
        type: string
        default: "chromium"
      environment:
        description: "Target environment: preview, staging, production"
        type: string
        default: "preview"
      test-pattern:
        description: "Test file pattern to run"
        type: string
        default: "**/*.e2e.{ts,js}"
      working-directory:
        description: "Working directory for tests"
        type: string
        default: "."
      base-url:
        description: "Base URL for E2E tests"
        type: string
        required: false
      timeout-minutes:
        description: "Timeout for E2E tests"
        type: number
        default: 30
      retries:
        description: "Number of test retries for flaky tests"
        type: number
        default: 2
      shard-total:
        description: "Total number of shards for parallel execution"
        type: number
        default: 1
      shard-index:
        description: "Current shard index (1-based)"
        type: number
        default: 1
    secrets:
      E2E_BASE_URL:
        required: false
        description: "E2E test base URL"
      E2E_AUTH_TOKEN:
        required: false
        description: "Authentication token for E2E tests"
    outputs:
      test-status:
        description: "Overall test status"
        value: ${{ jobs.e2e-tests.outputs.status }}
      total-tests:
        description: "Total number of tests run"
        value: ${{ jobs.e2e-tests.outputs.total }}
      passed-tests:
        description: "Number of passed tests"
        value: ${{ jobs.e2e-tests.outputs.passed }}
      failed-tests:
        description: "Number of failed tests"
        value: ${{ jobs.e2e-tests.outputs.failed }}

# Cancel superseded runs on the same PR
concurrency:
  group: e2e-${{ inputs.tier }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

jobs:
  # ============================================================================
  # Environment Health Check
  # ============================================================================
  health-check:
    name: Environment Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check environment health
        run: |
          BASE_URL="${{ inputs.base-url || secrets.E2E_BASE_URL }}"
          if [ -n "$BASE_URL" ]; then
            echo "Checking health of $BASE_URL"
            for i in {1..5}; do
              if curl -sf "$BASE_URL/health" || curl -sf "$BASE_URL" > /dev/null 2>&1; then
                echo "Environment is healthy"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done
            echo "Environment health check failed"
            exit 1
          else
            echo "No base URL specified, skipping health check"
          fi

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: E2E Tests (${{ inputs.tier }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    needs: health-check
    outputs:
      status: ${{ steps.results.outputs.status }}
      total: ${{ steps.results.outputs.total }}
      passed: ${{ steps.results.outputs.passed }}
      failed: ${{ steps.results.outputs.failed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec playwright install --with-deps ${{ inputs.browser }}

      - name: Run E2E tests
        id: e2e
        working-directory: ${{ inputs.working-directory }}
        run: |
          # Set test tag based on tier
          case "${{ inputs.tier }}" in
            smoke)
              TAG="@smoke"
              ;;
            regression)
              TAG="@smoke|@regression"
              ;;
            exhaustive)
              TAG=""
              ;;
          esac

          # Run Playwright tests
          pnpm exec playwright test \
            --project=${{ inputs.browser }} \
            --reporter=html,json,github \
            --retries=${{ inputs.retries }} \
            --shard=${{ inputs.shard-index }}/${{ inputs.shard-total }} \
            ${TAG:+--grep "$TAG"} \
            2>&1 | tee test-output.log || true
        env:
          BASE_URL: ${{ inputs.base-url || secrets.E2E_BASE_URL }}
          E2E_AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN }}
          E2E_TIER: ${{ inputs.tier }}

      - name: Parse test results
        id: results
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f test-results.json ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' test-results.json 2>/dev/null || echo "0")
            PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo "0")
            FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo "0")
          else
            # Fallback parsing from log
            TOTAL=$(grep -oP 'Running \K\d+' test-output.log 2>/dev/null || echo "0")
            PASSED=$(grep -oP '\d+(?= passed)' test-output.log 2>/dev/null || echo "0")
            FAILED=$(grep -oP '\d+(?= failed)' test-output.log 2>/dev/null || echo "0")
          fi

          if [ "$FAILED" -gt 0 ]; then
            STATUS="failed"
          else
            STATUS="passed"
          fi

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ inputs.tier }}-${{ inputs.shard-index }}
          path: |
            ${{ inputs.working-directory }}/playwright-report
            ${{ inputs.working-directory }}/test-results
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ inputs.tier }}-${{ inputs.shard-index }}
          path: |
            ${{ inputs.working-directory }}/test-results/**/*.png
            ${{ inputs.working-directory }}/test-results/**/*.webm
          retention-days: 14

      - name: Check test results
        if: always()
        run: |
          if [ "${{ steps.results.outputs.status }}" = "failed" ]; then
            echo "E2E tests failed: ${{ steps.results.outputs.failed }} failures out of ${{ steps.results.outputs.total }} tests"
            exit 1
          fi

  # ============================================================================
  # Flaky Test Detection
  # ============================================================================
  flaky-detection:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: e2e-tests
    if: always() && needs.e2e-tests.outputs.status == 'failed'

    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: e2e-artifacts-${{ inputs.tier }}-${{ inputs.shard-index }}
          path: ./artifacts

      - name: Analyze flaky tests
        run: |
          echo "## Flaky Test Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f artifacts/test-results.json ]; then
            # Extract tests that passed on retry
            jq -r '.suites[].specs[] | select(.tests[].results | length > 1) | .title' artifacts/test-results.json 2>/dev/null | while read test; do
              echo "- 🔄 **Flaky**: $test" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Flaky tests should be investigated and stabilized." >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Summary
  # ============================================================================
  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: [health-check, e2e-tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## E2E Test Summary (${{ inputs.tier }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ inputs.browser }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | ${{ inputs.tier }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | ${{ needs.e2e-tests.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ needs.e2e-tests.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ needs.e2e-tests.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.e2e-tests.outputs.status == 'passed' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        run: |
          if [ "${{ needs.e2e-tests.outputs.status }}" = "failed" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "E2E tests passed!"
