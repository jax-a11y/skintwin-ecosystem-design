# Reusable Node/TypeScript CI Workflow
# Used by: skintwin-asi, skintwin-customer-portal, regima-training-lms, business-directory-template, bus-listing
#
# This workflow provides standardized CI for all TypeScript/Node.js repositories in the ecosystem.
# It includes static checks, unit tests, build verification, and security scanning.

name: Node/TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "20"
      package-manager:
        description: "Package manager (npm, yarn, pnpm)"
        type: string
        default: "pnpm"
      working-directory:
        description: "Working directory for monorepo projects"
        type: string
        default: "."
      run-e2e:
        description: "Whether to run E2E tests"
        type: boolean
        default: false
      coverage-threshold:
        description: "Minimum coverage percentage required"
        type: number
        default: 80
      enable-matrix:
        description: "Enable matrix testing across Node versions"
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        required: false
        description: "NPM token for private packages"
      CODECOV_TOKEN:
        required: false
        description: "Codecov upload token"

# Cancel superseded runs on the same PR
concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_COLOR: 1

jobs:
  # ============================================================================
  # Static Analysis
  # ============================================================================
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run type checking
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run typecheck || pnpm run type-check || pnpm exec tsc --noEmit
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn typecheck || yarn type-check || yarn tsc --noEmit
          else
            npm run typecheck || npm run type-check || npx tsc --noEmit
          fi

      - name: Run linting
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run lint
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn lint
          else
            npm run lint
          fi

      - name: Check formatting
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run format:check || pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn format:check || yarn prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
          else
            npm run format:check || npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
          fi

  # ============================================================================
  # Unit Tests with Coverage
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run unit tests with coverage
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run test:coverage || pnpm run test -- --coverage
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn test:coverage || yarn test --coverage
          else
            npm run test:coverage || npm test -- --coverage
          fi
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ inputs.working-directory }}/coverage
          fail_ci_if_error: false

      - name: Check coverage threshold
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "Coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < ${{ inputs.coverage-threshold }}" | bc -l) )); then
              echo "Coverage ${COVERAGE}% is below threshold ${{ inputs.coverage-threshold }}%"
              exit 1
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ inputs.node-version }}
          path: |
            ${{ inputs.working-directory }}/coverage
            ${{ inputs.working-directory }}/test-results
          retention-days: 14

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build project
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run build
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn build
          else
            npm run build
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.working-directory }}
          artifact-name: sbom-node-${{ inputs.node-version }}.spdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node-${{ inputs.node-version }}
          path: |
            ${{ inputs.working-directory }}/dist
            ${{ inputs.working-directory }}/build
            ${{ inputs.working-directory }}/.next
          retention-days: 7

  # ============================================================================
  # Matrix Testing (Optional)
  # ============================================================================
  matrix-test:
    name: Matrix Test (Node ${{ matrix.node-version }})
    if: inputs.enable-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run test
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn test
          else
            npm test
          fi
        env:
          NODE_ENV: test

  # ============================================================================
  # Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, build]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.static-checks.result }}" != "success" ]; then
            echo "Static checks failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "All CI checks passed!"

      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Checks | ${{ needs.static-checks.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
